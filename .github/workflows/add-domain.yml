name: Add domain

on:
  repository_dispatch:
    types: [add-domain]

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse shared text
        id: page
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          from urllib.parse import urlparse

          with open(os.environ["GITHUB_EVENT_PATH"]) as f:
              event = json.load(f)

          shared = event["client_payload"]["url"].strip()

          # Find URL anywhere in the shared text
          match = re.search(r'https?://\S+', shared)

          if match:
              url = match.group(0).rstrip(').,')
              title = shared.replace(match.group(0), '').strip()
          else:
              url = shared
              title = ""

          # Clean title separators
          title = title.rstrip(" -|")

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"url={url}\n")
              out.write(f"title={title}\n")
          PY

      - name: Append to list
        run: |
          FILE="AI-SLOP-SITES.txt"

          touch "$FILE"

          DOMAIN=$(python3 - <<'PY'
          from urllib.parse import urlparse
          import os
          print(urlparse("${{ steps.page.outputs.url }}").hostname.replace("www.",""))
          PY
          )

          ENTRY="$DOMAIN # ${{ steps.page.outputs.title }}"

          if ! grep -Fxq "$ENTRY" "$FILE"; then
            echo "$ENTRY" >> "$FILE"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add AI-SLOP-SITES.txt

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Add shared page"
          git push
